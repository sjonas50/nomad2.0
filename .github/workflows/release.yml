name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build attic-admin image (arm64)
        run: |
          docker buildx build --platform linux/arm64 \
            -t attic-admin:latest \
            --output type=docker \
            .

      - name: Pull core dependency images (arm64)
        run: |
          # Core services only — optional services (FalkorDB, sidecar, TAK)
          # are pulled on-demand when enabled from the admin UI
          IMAGES=(
            "mysql:8.0"
            "redis:7-alpine"
            "ollama/ollama:latest"
            "qdrant/qdrant:v1.12.1"
          )
          for img in "${IMAGES[@]}"; do
            echo "Pulling $img for arm64..."
            docker pull --platform linux/arm64 "$img"
          done

      - name: Save all images to tarball
        run: |
          mkdir -p staging/images

          docker save \
            attic-admin:latest \
            mysql:8.0 \
            redis:7-alpine \
            ollama/ollama:latest \
            qdrant/qdrant:v1.12.1 \
            | gzip > staging/images/attic-images.tar.gz

          echo "Image bundle size: $(du -sh staging/images/attic-images.tar.gz | cut -f1)"

      - name: Assemble distribution package
        run: |
          STAGING="staging"

          cp docker-compose.prod.yml "$STAGING/docker-compose.yml"

          cat > "$STAGING/.env.example" << 'ENVEOF'
          # The Attic AI — Environment Configuration
          TZ=UTC
          PORT=3333
          HOST=0.0.0.0
          LOG_LEVEL=info
          APP_KEY=__GENERATED_ON_INSTALL__
          NODE_ENV=production
          SESSION_DRIVER=cookie
          DB_HOST=mysql
          DB_PORT=3306
          DB_USER=attic
          DB_PASSWORD=attic_password
          DB_DATABASE=attic
          DB_ROOT_PASSWORD=attic_root
          REDIS_HOST=redis
          REDIS_PORT=6379
          QUEUE_REDIS_HOST=redis
          QUEUE_REDIS_PORT=6379
          OLLAMA_HOST=http://ollama:11434
          QDRANT_HOST=http://qdrant:6333
          QDRANT_COLLECTION=attic_knowledge_base
          FALKORDB_ENABLED=false
          FALKORDB_HOST=falkordb
          FALKORDB_PORT=6379
          SIDECAR_URL=http://sidecar:8100
          NODE_ID=attic-node-1
          BUNDLE_DIR=/app/storage/bundles
          ENVEOF

          cp install.command "$STAGING/install.command"
          cp uninstall.command "$STAGING/uninstall.command"
          chmod +x "$STAGING/install.command" "$STAGING/uninstall.command"

          cat > "$STAGING/README.txt" << 'README'
          The Attic AI — Offline Knowledge Platform
          ==========================================

          REQUIREMENTS:
            - macOS (Apple Silicon)
            - Docker Desktop (https://docker.com/products/docker-desktop)

          INSTALL:
            1. Install Docker Desktop if you don't have it
            2. Start Docker Desktop and wait for it to be ready
            3. Double-click install.command

            Open http://localhost:3333 when complete.

          UNINSTALL:
            Double-click uninstall.command
          README

      - name: Create zip archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUNDLE_NAME="attic-ai-v${VERSION}-arm64.zip"

          mv staging "attic-ai-v${VERSION}-arm64"
          zip -qr "$BUNDLE_NAME" "attic-ai-v${VERSION}-arm64/"

          mkdir -p dist
          mv "$BUNDLE_NAME" dist/
          echo "Bundle size: $(du -sh "dist/$BUNDLE_NAME" | cut -f1)"

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Attic AI v${{ steps.version.outputs.VERSION }}"
          draft: true
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/checksums-sha256.txt
          body: |
            ## Installation

            1. Install [Docker Desktop](https://www.docker.com/products/docker-desktop/) if you don't have it
            2. Download `attic-ai-v${{ steps.version.outputs.VERSION }}-arm64.zip` below
            3. Unzip and double-click `install.command`
            4. Open http://localhost:3333

            **Requirements:** macOS (Apple Silicon), Docker Desktop

            > **Note:** AI models (~1-5GB) are downloaded automatically on first run.
            > Optional services (FalkorDB, Python sidecar, TAK Server) can be enabled from Admin > Services.

            ## Verify download
            ```bash
            sha256sum -c checksums-sha256.txt
            ```
