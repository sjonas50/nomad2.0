name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push attic-admin image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/attic-admin:latest
            ghcr.io/${{ github.repository_owner }}/attic-admin:v${{ steps.version.outputs.VERSION }}

      - name: Assemble distribution package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          OWNER="${{ github.repository_owner }}"
          STAGING="attic-ai-v${VERSION}"

          mkdir -p "$STAGING"

          # Compose file — rewrite attic_admin image to use GHCR
          sed "s|build:|image: ghcr.io/${OWNER}/attic-admin:v${VERSION}  # build:|" \
            docker-compose.prod.yml > "$STAGING/docker-compose.yml"

          # Remove the build context lines (context: and dockerfile:)
          sed -i '/^[[:space:]]*context:/d; /^[[:space:]]*dockerfile:/d' "$STAGING/docker-compose.yml"

          # Env template
          cat > "$STAGING/.env.example" << 'ENVEOF'
          # The Attic AI — Environment Configuration
          TZ=UTC
          PORT=3333
          HOST=0.0.0.0
          LOG_LEVEL=info
          APP_KEY=__GENERATED_ON_INSTALL__
          NODE_ENV=production
          SESSION_DRIVER=cookie
          DB_HOST=mysql
          DB_PORT=3306
          DB_USER=attic
          DB_PASSWORD=attic_password
          DB_DATABASE=attic
          DB_ROOT_PASSWORD=attic_root
          REDIS_HOST=redis
          REDIS_PORT=6379
          QUEUE_REDIS_HOST=redis
          QUEUE_REDIS_PORT=6379
          OLLAMA_HOST=http://ollama:11434
          QDRANT_HOST=http://qdrant:6333
          QDRANT_COLLECTION=attic_knowledge_base
          FALKORDB_ENABLED=false
          FALKORDB_HOST=falkordb
          FALKORDB_PORT=6379
          SIDECAR_URL=http://sidecar:8100
          NODE_ID=attic-node-1
          BUNDLE_DIR=/app/storage/bundles
          ENVEOF

          cp install.command "$STAGING/install.command"
          cp uninstall.command "$STAGING/uninstall.command"
          chmod +x "$STAGING/install.command" "$STAGING/uninstall.command"

          cat > "$STAGING/README.txt" << 'README'
          The Attic AI — Offline Knowledge Platform
          ==========================================

          REQUIREMENTS:
            - macOS (Apple Silicon) with internet connection for first install
            - Docker Desktop (https://docker.com/products/docker-desktop)

          INSTALL:
            1. Install Docker Desktop if you don't have it
            2. Start Docker Desktop and wait for it to be ready
            3. Double-click install.command

            The installer pulls Docker images (~3GB) and AI models (~1-5GB).
            First install takes 10-20 minutes depending on internet speed.

            Open http://localhost:3333 when complete.

          UNINSTALL:
            Double-click uninstall.command
          README

          zip -qr "attic-ai-v${VERSION}-arm64.zip" "$STAGING/"
          mkdir -p dist
          mv "attic-ai-v${VERSION}-arm64.zip" dist/
          echo "Bundle size: $(du -sh "dist/attic-ai-v${VERSION}-arm64.zip" | cut -f1)"

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Attic AI v${{ steps.version.outputs.VERSION }}"
          draft: true
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/checksums-sha256.txt
          body: |
            ## Installation

            1. Install [Docker Desktop](https://www.docker.com/products/docker-desktop/) if you don't have it
            2. Download `attic-ai-v${{ steps.version.outputs.VERSION }}-arm64.zip` below
            3. Unzip and double-click `install.command`
            4. Open http://localhost:3333

            **Requirements:** macOS (Apple Silicon), internet connection for first install, Docker Desktop

            > **Note:** The installer pulls Docker images (~3GB) and AI models (~1-5GB) on first run.
            > Install takes 10-20 minutes depending on internet speed.
            > Optional services (FalkorDB, Python sidecar, TAK Server) can be enabled from Admin > Services.

            ## Verify download
            ```bash
            sha256sum -c checksums-sha256.txt
            ```
